services:
  backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    container_name: coworking_hub_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/coworking_hub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Belgrade
      SPRING_DATASOURCE_USERNAME: coworking
      SPRING_DATASOURCE_PASSWORD: coworking123
    ports:
      - "8080:8080"
    volumes:
      - ./backend/app/uploads:/app/uploads

  mysql:
    image: mysql:8.0
    container_name: coworking_hub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coworking_hub
      MYSQL_USER: coworking
      MYSQL_PASSWORD: coworking123
    ports:
      - "3307:3306"
    volumes:
      - coworking_data:/var/lib/mysql
      - ./backend/baza/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  coworking_data:
