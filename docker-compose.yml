services:
  mysql:
    image: mysql:8.0
    container_name: coworking_hub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coworking_hub
      MYSQL_USER: coworking
      MYSQL_PASSWORD: coworking123
    ports:
      - "3307:3306"
    volumes:
      - coworking_data:/var/lib/mysql
      - ./backend/baza/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  coworking_data:
